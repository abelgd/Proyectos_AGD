name: La mesa desordenada
author: Abel García Domínguez
category: cryptography

description: |
  Tras el registro del domicilio de un criminal, los agentes encontraron varias pruebas en la cocina. Puede haber información oculta entre las evidencias recogidas. 

value: 30

# Tipo de reto.
# NO modificar este valor.
